<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cart — ShopEase</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <header class="site-header" id="site-header"></header>
    <main>
      <h1>Shopping cart</h1>
      <div id="alert"></div>
      <div class="table-wrap" id="wrap">
        <table>
          <thead>
            <tr>
              <th>Product</th>
              <th>Price</th>
              <th>Qty</th>
              <th>Line</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
      <p style="font-size:1.1rem;margin-top:1rem">
        Subtotal: <strong id="sub">$0.00</strong>
      </p>
      <a class="btn btn-primary" href="/Checkout.html" id="chk" style="margin-top:0.5rem;display:inline-block"
        >Proceed to checkout</a
      >
    </main>
    <footer class="site-footer">ShopEase</footer>
    <script src="/js/api.js"></script>
    <script src="/js/nav.js"></script>
    <script>
      if (!ShopEase.getToken()) location.href = '/Login.html';

      function alertMsg(m, t) {
        document.getElementById('alert').innerHTML = m
          ? '<div class="alert alert-' + (t || 'error') + '">' + m + '</div>'
          : '';
      }

      async function load() {
        try {
          const d = await ShopEase.api('/cart');
          const tb = document.getElementById('rows');
          tb.innerHTML = '';
          document.getElementById('sub').textContent = '$' + Number(d.subtotal || 0).toFixed(2);
          if (!d.items.length) {
            tb.innerHTML = '<tr><td colspan="5">Cart is empty</td></tr>';
            document.getElementById('chk').style.display = 'none';
            return;
          }
          document.getElementById('chk').style.display = 'inline-block';
          d.items.forEach((line) => {
            const tr = document.createElement('tr');
            tr.innerHTML =
              '<td>' +
              line.name +
              '<div class="brand">' +
              line.brand +
              '</div></td>' +
              '<td>$' +
              Number(line.price).toFixed(2) +
              '</td>' +
              '<td><input type="number" min="1" data-id="' +
              line.id +
              '" class="q" value="' +
              line.quantity +
              '" style="width:4rem"/></td>' +
              '<td>$' +
              Number(line.line_total).toFixed(2) +
              '</td>' +
              '<td><button class="btn btn-secondary rm" data-id="' +
              line.id +
              '">Remove</button></td>';
            tb.appendChild(tr);
          });
          tb.querySelectorAll('.q').forEach((inp) =>
            inp.addEventListener('change', async () => {
              try {
                await ShopEase.api('/cart/items/' + inp.dataset.id, {
                  method: 'PATCH',
                  body: JSON.stringify({ quantity: Number(inp.value) }),
                });
                await load();
                alertMsg('');
              } catch (e) {
                alertMsg(e.message);
                await load();
              }
            })
          );
          tb.querySelectorAll('.rm').forEach((b) =>
            b.addEventListener('click', async () => {
              await ShopEase.api('/cart/items/' + b.dataset.id, { method: 'DELETE' });
              await load();
            })
          );
        } catch (e) {
          alertMsg(e.message);
        }
      }
      document.addEventListener('DOMContentLoaded', load);
    </script>
  </body>
</html>
