<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Products — ShopEase</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <header class="site-header" id="site-header"></header>
    <main>
      <h1>Products</h1>
      <div id="alert"></div>
      <div class="form-panel" style="max-width:none">
        <h2>Add product</h2>
        <form id="add">
          <div class="field"><label>Name</label><input name="name" required /></div>
          <div class="field"><label>Brand</label><input name="brand" required /></div>
          <div class="field"><label>Category ID</label><input name="category_id" type="number" required /></div>
          <div class="field"><label>Price</label><input name="price" type="number" step="0.01" required /></div>
          <div class="field"><label>Stock</label><input name="stock_quantity" type="number" required /></div>
          <div class="field"><label>Description</label><textarea name="description" rows="2"></textarea></div>
          <div class="field">
            <label>Image URLs (comma)</label>
            <input name="images" placeholder="/assets/placeholder.svg" />
          </div>
          <button type="submit" class="btn btn-primary">Create</button>
        </form>
      </div>
      <div class="table-wrap" style="margin-top:1.5rem">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Brand</th>
              <th>Name</th>
              <th>Price</th>
              <th>Stock</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </main>
    <script src="/js/api.js"></script>
    <script src="/js/nav.js"></script>
    <script>
      if (!ShopEase.getToken() || ShopEase.getUser().role !== 'admin') location.href = '/Login.html';

      async function loadList() {
        const d = await ShopEase.api('/products?limit=50');
        const tb = document.getElementById('rows');
        tb.innerHTML = '';
        d.data.forEach((p) => {
          const tr = document.createElement('tr');
          tr.innerHTML =
            '<td>' +
            p.id +
            '</td><td>' +
            p.brand +
            '</td><td>' +
            p.name +
            '</td><td>$' +
            Number(p.price).toFixed(2) +
            '</td><td>' +
            p.stock_quantity +
            '</td>';
          tb.appendChild(tr);
        });
      }

      document.getElementById('add').addEventListener('submit', async (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const images = (fd.get('images') || '')
          .split(',')
          .map((s) => s.trim())
          .filter(Boolean);
        const body = {
          name: fd.get('name'),
          brand: fd.get('brand'),
          category_id: Number(fd.get('category_id')),
          price: Number(fd.get('price')),
          stock_quantity: Number(fd.get('stock_quantity')),
          description: fd.get('description') || '',
          images,
        };
        try {
          await ShopEase.api('/products', { method: 'POST', body: JSON.stringify(body) });
          document.getElementById('alert').innerHTML =
            '<div class="alert alert-success">Product created</div>';
          e.target.reset();
          await loadList();
        } catch (err) {
          document.getElementById('alert').innerHTML =
            '<div class="alert alert-error">' + err.message + '</div>';
        }
      });

      document.addEventListener('DOMContentLoaded', () => loadList().catch(console.error));
    </script>
  </body>
</html>
